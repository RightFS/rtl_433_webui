name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Frontend build ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node / Vite)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── C++ backend build ───────────────────────────────────────────────────────
  backend:
    name: Backend (CMake / C++17)
    runs-on: ubuntu-latest
    needs: frontend
    permissions:
      contents: read

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            build-essential \
            libusb-1.0-0-dev \
            python3 \
            doxygen

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Configure (CMake)
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_RTLSDR=AUTO \
            -DENABLE_SOAPYSDR=AUTO \
            -DENABLE_OPENSSL=OFF

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtl433_webui-linux-x86_64
          path: build/server/rtl433_webui
          retention-days: 7
